name: CI/CD Cantinho do Ciclista

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: CI - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: site/my-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/my-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Test Build
        run: npm run build

  deploy:
    name: CD - Deploy via SSH
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            DEPLOY_DIR="$HOME/Projects/CantinhoCiclista"

            echo "📂 Acessando diretório do projeto..."
            cd $DEPLOY_DIR

            echo "🔄 Atualizando código..."
            git pull origin main

            echo "🐳 Rebuilding e subindo container..."
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído — cantinhodociclista.gabrielguimaraes.pro"
